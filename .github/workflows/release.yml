name: Build And Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-publish-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Virtual Environment
        shell: powershell
        run: |
          python -m venv .venv

      - name: Build Windows Executable
        shell: powershell
        run: |
          $pythonExe = ".venv\Scripts\python.exe"
          if (-not (Test-Path $pythonExe)) {
            throw "Python da venv nao encontrado em $pythonExe"
          }

          & $pythonExe -V
          & $pythonExe -m pip install --upgrade pip
          & $pythonExe -m pip install -r requirements.txt pyinstaller
          & $pythonExe -m PyInstaller `
            launcher_desktop.py `
            --noconfirm `
            --clean `
            --windowed `
            --name CFO-Sync `
            --paths src `
            --add-data "sounds;sounds" `
            --add-data "templates;templates"

          if (-not (Test-Path "dist\CFO-Sync\CFO-Sync.exe")) {
            throw "Executavel nao gerado em dist\CFO-Sync\CFO-Sync.exe"
          }

          New-Item -ItemType Directory -Force -Path "dist\installer" | Out-Null
          Copy-Item "dist\CFO-Sync\CFO-Sync.exe" "dist\installer\CFO-Sync-Setup.exe" -Force
          Get-ChildItem -Path dist -Recurse | Select-Object FullName

      - name: Build Release Notes From CHANGELOG
        run: |
          python tools/changelog_extract.py --version "${GITHUB_REF_NAME#v}" --output release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/installer/CFO-Sync-Setup.exe
            dist/CFO-Sync/CFO-Sync.exe
