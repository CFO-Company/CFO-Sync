name: Build And Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-publish-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Virtual Environment
        shell: powershell
        run: |
          python -m venv .venv

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress
          $innoDirX86 = "${env:ProgramFiles(x86)}\Inno Setup 6"
          $innoDirX64 = "${env:ProgramFiles}\Inno Setup 6"
          if (Test-Path $innoDirX86) {
            Add-Content -Path $env:GITHUB_PATH -Value $innoDirX86
          } elseif (Test-Path $innoDirX64) {
            Add-Content -Path $env:GITHUB_PATH -Value $innoDirX64
          } else {
            throw "Inno Setup instalado, mas pasta do ISCC nao encontrada."
          }

      - name: Build Windows Package
        shell: powershell
        run: |
          $pythonExe = ".venv\Scripts\python.exe"
          if (-not (Test-Path $pythonExe)) {
            throw "Python da venv nao encontrado em $pythonExe"
          }
          .\tools\build_windows_package.ps1 -PythonExe $pythonExe
          if (-not (Test-Path "dist\installer\CFO-Sync-Setup.exe")) {
            throw "Instalador nao encontrado em dist\installer\CFO-Sync-Setup.exe"
          }
          Get-ChildItem -Path dist\installer -File | Select-Object FullName

      - name: Build Release Notes From CHANGELOG
        shell: powershell
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          python tools/changelog_extract.py --version "$version" --output release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/installer/CFO-Sync-Setup.exe
